name: Deploy Safety Check

on:
  pull_request:
    branches: [main]

jobs:
  deploy-impact:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Analyze deploy impact
        id: impact
        run: |
          BASE_SHA=${{ github.event.pull_request.base.sha }}
          HEAD_SHA=${{ github.event.pull_request.head.sha }}

          # Detect migration changes
          MIGRATIONS=$(git diff --name-only $BASE_SHA $HEAD_SHA -- 'supabase/migrations/' | wc -l)
          MIGRATION_FILES=$(git diff --name-only $BASE_SHA $HEAD_SHA -- 'supabase/migrations/' || echo "")

          # Detect edge function changes
          FUNCTIONS=$(git diff --name-only $BASE_SHA $HEAD_SHA -- 'supabase/functions/' | wc -l)
          FUNCTION_FILES=$(git diff --name-only $BASE_SHA $HEAD_SHA -- 'supabase/functions/' || echo "")

          # Detect env/config changes
          ENV_CHANGES=$(git diff --name-only $BASE_SHA $HEAD_SHA -- '.env*' 'scripts/validate-env.ts' 'vercel.json' 'render.yaml' 'supabase/config.toml' | wc -l)

          # Detect workflow changes
          WORKFLOW_CHANGES=$(git diff --name-only $BASE_SHA $HEAD_SHA -- '.github/workflows/' | wc -l)

          # Detect billing/payment changes
          BILLING_CHANGES=$(git diff --name-only $BASE_SHA $HEAD_SHA -- 'src/billing/' 'src/constants/revenuecat.ts' | wc -l)

          # Detect auth changes
          AUTH_CHANGES=$(git diff --name-only $BASE_SHA $HEAD_SHA -- 'src/features/auth/' 'src/integrations/supabase/' | wc -l)

          # Build impact summary
          IMPACT=""
          RISK="LOW"

          if [ "$MIGRATIONS" -gt 0 ]; then
            IMPACT="${IMPACT}\n### Database Migrations ($MIGRATIONS files)\n> **WARNING**: Migrations are irreversible. Rollback = forward-fix only.\n\n\`\`\`\n${MIGRATION_FILES}\n\`\`\`\n"
            RISK="HIGH"
          fi

          if [ "$FUNCTIONS" -gt 0 ]; then
            IMPACT="${IMPACT}\n### Edge Functions ($FUNCTIONS files)\n> Edge functions deploy independently. Verify with \`supabase functions serve\` locally.\n\n\`\`\`\n${FUNCTION_FILES}\n\`\`\`\n"
            if [ "$RISK" != "HIGH" ]; then RISK="MEDIUM"; fi
          fi

          if [ "$ENV_CHANGES" -gt 0 ]; then
            IMPACT="${IMPACT}\n### Environment/Config Changes\n> Verify .env.example is updated and secrets are configured in Vercel/Supabase.\n"
            if [ "$RISK" != "HIGH" ]; then RISK="MEDIUM"; fi
          fi

          if [ "$WORKFLOW_CHANGES" -gt 0 ]; then
            IMPACT="${IMPACT}\n### CI/CD Workflow Changes\n> Review workflow changes carefully for security and correctness.\n"
          fi

          if [ "$BILLING_CHANGES" -gt 0 ]; then
            IMPACT="${IMPACT}\n### Billing/Payment Changes\n> Test payment flows end-to-end before merging.\n"
            if [ "$RISK" != "HIGH" ]; then RISK="MEDIUM"; fi
          fi

          if [ "$AUTH_CHANGES" -gt 0 ]; then
            IMPACT="${IMPACT}\n### Auth/Supabase Integration Changes\n> Verify auth flows, RLS policies, and session handling.\n"
            if [ "$RISK" != "HIGH" ]; then RISK="MEDIUM"; fi
          fi

          if [ -z "$IMPACT" ]; then
            IMPACT="\nNo high-impact deploy surfaces changed. Standard code-only change.\n"
          fi

          # Write outputs
          echo "risk=$RISK" >> $GITHUB_OUTPUT
          echo "migrations=$MIGRATIONS" >> $GITHUB_OUTPUT
          echo "functions=$FUNCTIONS" >> $GITHUB_OUTPUT

          # Write impact to file for the comment step
          printf "## Deploy Impact Analysis\n\n**Risk Level: $RISK**\n$IMPACT\n\n---\n*Auto-generated by deploy-safety workflow*" > /tmp/deploy-impact.md

      - name: Post deploy impact comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/deploy-impact.md', 'utf8');

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.body.includes('Deploy Impact Analysis') &&
              c.user.type === 'Bot'
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
