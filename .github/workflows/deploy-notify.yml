name: Deploy Notification

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    permissions:
      deployments: write

    steps:
      - name: Create GitHub deployment record
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.payload.workflow_run.head_sha,
              environment: 'production',
              auto_merge: false,
              required_contexts: [],
              description: `Deploy from CI #${context.payload.workflow_run.run_number}`,
            });

            if (deployment.data.id) {
              await github.rest.repos.createDeploymentStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                deployment_id: deployment.data.id,
                state: 'success',
                description: 'Deployment completed successfully',
                environment: 'production',
              });
              console.log(`Created deployment ${deployment.data.id}`);
            }

  notify-failure:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'failure'
    permissions:
      deployments: write

    steps:
      - name: Record failed deployment
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.payload.workflow_run.head_sha,
              environment: 'production',
              auto_merge: false,
              required_contexts: [],
              description: `Failed deploy from CI #${context.payload.workflow_run.run_number}`,
            });

            if (deployment.data.id) {
              await github.rest.repos.createDeploymentStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                deployment_id: deployment.data.id,
                state: 'failure',
                description: 'Deployment failed — check CI logs',
                environment: 'production',
              });
              console.log(`Created failed deployment record ${deployment.data.id}`);
            }
